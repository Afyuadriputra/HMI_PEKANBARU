{% extends "base.html" %}
{% block content %}
<h1 class="mb-4 text-xl font-semibold">Request Upload Berita</h1>
<div class="rounded border bg-white">
  {% for item in items %}
    <div class="border-b p-4 text-sm">
      <div class="flex items-start justify-between gap-4">
        <div>
          <h2 class="font-semibold">{{ item.title }}</h2>
          <p class="text-slate-600">{{ item.requester_name }} - {{ item.status }} - Rp{{ item.price }}</p>
        </div>
        <div class="flex flex-wrap gap-2">
          <a class="text-green-700" href="{% url 'news_request:verify_payment' item.id %}">Verifikasi</a>
          <a class="text-green-700" href="{% url 'news_request:approve' item.id %}">Approve</a>
          <a class="text-red-700" href="{% url 'news_request:reject' item.id %}">Reject</a>
          <a class="text-green-700" href="{% url 'news_request:publish' item.id %}">Publish</a>
        </div>
      </div>
    </div>
  {% empty %}
    <p class="p-3 text-sm">Belum ada request.</p>
  {% endfor %}
</div>
{% endblock %}
