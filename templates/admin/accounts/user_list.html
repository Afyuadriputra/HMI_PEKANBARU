{% extends "base.html" %}
{% block content %}
<div class="mb-4 flex items-center justify-between">
  <h1 class="text-xl font-semibold">User Admin</h1>
  <a class="rounded bg-green-700 px-3 py-2 text-sm text-white" href="{% url 'accounts:user_create' %}">Tambah</a>
</div>
<div class="overflow-x-auto rounded border bg-white">
  <table class="w-full text-sm">
    <thead class="bg-slate-100"><tr><th class="p-2 text-left">Nama</th><th class="p-2 text-left">Email</th><th class="p-2 text-left">Role</th><th class="p-2 text-left">Status</th><th class="p-2"></th></tr></thead>
    <tbody>{% for item in users %}<tr class="border-t"><td class="p-2">{{ item.name }}</td><td class="p-2">{{ item.email }}</td><td class="p-2">{{ item.role }}</td><td class="p-2">{{ item.status }}</td><td class="p-2 text-right"><a href="{% url 'accounts:user_update' item.id %}" class="text-green-700">Edit</a></td></tr>{% endfor %}</tbody>
  </table>
</div>
{% endblock %}
