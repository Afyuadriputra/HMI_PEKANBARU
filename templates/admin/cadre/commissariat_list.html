{% extends "base.html" %}
{% block content %}
<div class="mb-4 flex items-center justify-between"><h1 class="text-xl font-semibold">Komisariat</h1><a class="rounded bg-green-700 px-3 py-2 text-sm text-white" href="{% url 'cadre:commissariat_create' %}">Tambah</a></div>
<div class="rounded border bg-white">{% for item in items %}<div class="flex justify-between border-b p-3 text-sm"><span>{{ item.name }} - {{ item.university }}</span><a class="text-green-700" href="{% url 'cadre:commissariat_update' item.id %}">Edit</a></div>{% empty %}<p class="p-3 text-sm">Belum ada data.</p>{% endfor %}</div>
{% endblock %}
