{% extends "base.html" %}
{% block title %}{{ title }}{% endblock %}
{% block content %}
<section class="rounded border bg-white p-6">
  <h1 class="mb-4 text-xl font-semibold">{{ title }}</h1>
  <form method="post" enctype="multipart/form-data" class="space-y-4">
    {% csrf_token %}
    {{ form.as_p }}
    <div class="flex gap-2">
      <button class="rounded bg-green-700 px-4 py-2 text-sm font-medium text-white">Simpan</button>
      <a href="{{ request.META.HTTP_REFERER|default:'/' }}" class="rounded border px-4 py-2 text-sm">Batal</a>
    </div>
  </form>
</section>
{% endblock %}
