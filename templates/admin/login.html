{% extends "base.html" %}
{% block title %}Login Admin{% endblock %}
{% block content %}
<section class="mx-auto max-w-md rounded border bg-white p-6">
  <h1 class="mb-4 text-xl font-semibold">Login Admin</h1>
  <form method="post" class="space-y-4">
    {% csrf_token %}
    {{ form.as_p }}
    <button class="rounded bg-green-700 px-4 py-2 text-sm font-medium text-white">Login</button>
  </form>
</section>
{% endblock %}
