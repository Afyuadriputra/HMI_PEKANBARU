<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HMI Pekanbaru</title>
    <style>
        :root {
            color-scheme: light;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            font-family: Inter, system-ui, sans-serif;
            background: linear-gradient(135deg, #f9f9f9 0%, #f3f3f3 100%);
            color: #00450d;
        }

        .loader {
            text-align: center;
            padding: 24px;
        }

        .loader h1 {
            margin: 0 0 8px;
            font-size: 20px;
        }

        .loader p {
            margin: 0;
            color: #5f5e5e;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="loader">
        <h1>Memuat tampilan terbaik...</h1>
        <p>Halaman akan menyesuaikan otomatis dengan ukuran perangkat.</p>
    </div>

    <script>
        (function() {
            const desktopMedia = window.matchMedia("(min-width: 768px)");

            function resolveTarget() {
                return desktopMedia.matches ? "{% url 'website:desktop' %}" : "{% url 'website:mobile' %}";
            }

            window.location.replace(resolveTarget());
        })();
    </script>
</body>
</html>
