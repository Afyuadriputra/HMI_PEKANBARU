<!doctype html>
<html class="light" lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}HMI Pekanbaru{% endblock %}</title>
  <link href="https://fonts.googleapis.com" rel="preconnect">
  <link crossorigin href="https://fonts.gstatic.com" rel="preconnect">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            primary: "#00450d",
            "primary-container": "#1b5e20",
            "on-primary": "#ffffff",
            secondary: "#5f5e5e",
            surface: "#f9f9f9",
            "surface-container-low": "#f3f3f3",
            "surface-container": "#eeeeee",
            "surface-container-high": "#e8e8e8",
            tertiary: "#705d00",
            "tertiary-fixed": "#ffe16d",
            "on-tertiary-fixed": "#221b00",
            "on-tertiary-fixed-variant": "#544600",
            outline: "#717a6d"
          },
          fontSize: {
            "sz-1": ["clamp(32px,6vw,48px)", "1.15"],
            "sz-2": ["clamp(24px,4vw,32px)", "1.2"],
            "sz-3": ["clamp(18px,2.4vw,24px)", "1.3"],
            "sz-4": ["clamp(14px,1.8vw,16px)", "1.5"]
          },
          fontFamily: { sans: ["Inter", "sans-serif"] }
        }
      }
    }
  </script>
  <style>
    html { scroll-behavior: smooth; }
    body { font-family: Inter, sans-serif; -webkit-tap-highlight-color: transparent; }
    .material-symbols-outlined { font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24; display: inline-block; vertical-align: middle; }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body class="bg-surface text-secondary selection:bg-tertiary-fixed selection:text-on-tertiary-fixed">
  <nav class="fixed top-0 z-50 hidden w-full bg-[#f9f9f9]/90 shadow-sm backdrop-blur-xl md:block">
    <div class="mx-auto flex max-w-screen-2xl items-center justify-between px-16 py-4">
      <a href="{% url 'website:home' %}" class="flex items-center">
        <img src="https://hmipemkabriau.com/img/logohmi.png" alt="Logo HMI Pekanbaru" class="h-16 w-auto object-contain">
      </a>
      <div class="flex items-center gap-8">
        <a class="text-sz-4 border-b-2 border-tertiary pb-2 font-bold text-primary" href="{% url 'website:home' %}">Beranda</a>
        <a class="text-sz-4 transition hover:text-primary" href="#profil">Profil</a>
        <a class="text-sz-4 transition hover:text-primary" href="#pengurus">Pengurus</a>
        <a class="text-sz-4 transition hover:text-primary" href="#program">Program</a>
        <a class="text-sz-4 transition hover:text-primary" href="#berita">Berita</a>
        <a class="text-sz-4 transition hover:text-primary" href="#galeri">Galeri</a>
      </div>
      <a href="#kontak" class="flex scale-95 items-center gap-2 rounded-xl bg-primary px-8 py-4 text-sz-4 font-medium text-on-primary transition hover:bg-primary-container">Hubungi Kami</a>
    </div>
  </nav>

  <header class="fixed top-0 z-50 w-full border-b border-outline/10 bg-[#f9f9f9]/90 shadow-sm backdrop-blur-xl md:hidden">
    <div class="flex items-center justify-between px-6 py-3">
      <a href="{% url 'website:home' %}" class="flex items-center gap-3">
        <img src="https://hmipemkabriau.com/img/logohmi.png" alt="Logo HMI" class="h-10 w-auto object-contain">
        <span class="text-sz-3 font-bold tracking-tight text-primary">HMI Pekanbaru</span>
      </a>
      <a href="{% url 'accounts:login' %}" class="flex h-10 w-10 items-center justify-center rounded-full bg-primary/10 text-primary">
        <span class="material-symbols-outlined text-sz-3">person</span>
      </a>
    </div>
  </header>

  <nav class="fixed bottom-0 z-50 w-full border-t border-outline/10 bg-white/90 px-6 py-3 pb-4 shadow-[0_-8px_32px_rgba(0,0,0,0.05)] backdrop-blur-2xl md:hidden">
    <div class="flex items-center justify-between">
      <a href="#beranda" class="flex flex-col items-center gap-1 text-primary"><span class="material-symbols-outlined text-[28px]">home</span><span class="text-[10px] font-bold">Beranda</span></a>
      <a href="#profil" class="flex flex-col items-center gap-1 text-secondary"><span class="material-symbols-outlined text-[28px]">account_balance</span><span class="text-[10px] font-semibold">Profil</span></a>
      <a href="#agenda" class="flex flex-col items-center gap-1 text-secondary"><span class="material-symbols-outlined text-[28px]">event_note</span><span class="text-[10px] font-semibold">Agenda</span></a>
      <a href="#berita" class="flex flex-col items-center gap-1 text-secondary"><span class="material-symbols-outlined text-[28px]">article</span><span class="text-[10px] font-semibold">Berita</span></a>
      <a href="#kontak" class="flex flex-col items-center gap-1 text-secondary"><span class="material-symbols-outlined text-[28px]">menu</span><span class="text-[10px] font-semibold">Menu</span></a>
    </div>
  </nav>

  {% block content %}{% endblock %}
</body>
</html>
