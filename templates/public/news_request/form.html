{% extends "base.html" %}
{% block content %}
<section class="rounded border bg-white p-6">
  <h1 class="mb-4 text-xl font-semibold">Request Upload Berita</h1>
  <p class="mb-4 text-sm text-slate-600">Biaya default Rp50.000. Setelah submit, upload bukti pembayaran.</p>
  <form method="post" enctype="multipart/form-data" class="space-y-4">
    {% csrf_token %}
    {{ form.as_p }}
    <button class="rounded bg-green-700 px-4 py-2 text-sm text-white">Submit</button>
  </form>
</section>
{% endblock %}
