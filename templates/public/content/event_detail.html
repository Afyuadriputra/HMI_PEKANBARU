{% extends "base.html" %}
{% block content %}
<article class="rounded border bg-white p-6">
  <h1 class="text-2xl font-semibold">{{ event.title }}</h1>
  <p class="mt-2 text-sm text-slate-500">{{ event.start_date }} - {{ event.location }}</p>
  <div class="mt-6 text-slate-700">{{ event.content|linebreaks }}</div>
  {% if event.registration_form_url %}<a class="mt-6 inline-block rounded bg-green-700 px-4 py-2 text-sm text-white" href="{{ event.registration_form_url }}" target="_blank" rel="noopener">Daftar</a>{% endif %}
</article>
{% endblock %}
