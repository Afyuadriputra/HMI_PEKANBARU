{% extends "base.html" %}
{% block content %}
<article class="rounded border bg-white p-6">
  <h1 class="text-2xl font-semibold">{{ post.title }}</h1>
  <p class="mt-2 text-sm text-slate-500">{{ post.published_at }}{% if post.category %} - {{ post.category.name }}{% endif %}</p>
  <div class="mt-6 text-slate-700">{{ post.content|linebreaks }}</div>
</article>
{% endblock %}
