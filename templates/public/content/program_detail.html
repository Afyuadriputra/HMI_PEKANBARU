{% extends "base.html" %}
{% block content %}
<article class="rounded border bg-white p-6">
  <h1 class="text-2xl font-semibold">{{ program.title }}</h1>
  <div class="mt-6 text-slate-700">{{ program.content|linebreaks }}</div>
  {% if program.registration_form_url %}<a class="mt-6 inline-block rounded bg-green-700 px-4 py-2 text-sm text-white" href="{{ program.registration_form_url }}" target="_blank" rel="noopener">Daftar</a>{% endif %}
</article>
{% endblock %}
