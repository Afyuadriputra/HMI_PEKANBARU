{% extends "base.html" %}
{% block content %}
<h1 class="mb-4 text-2xl font-semibold">Agenda</h1>
<div class="grid gap-4 md:grid-cols-3">{% for item in events %}<a class="rounded border bg-white p-4" href="{% url 'events:detail' item.slug %}"><h2 class="font-semibold">{{ item.title }}</h2><p class="mt-2 text-sm text-slate-600">{{ item.start_date }} - {{ item.location }}</p></a>{% empty %}<p class="text-sm text-slate-500">Belum ada agenda.</p>{% endfor %}</div>
{% endblock %}
